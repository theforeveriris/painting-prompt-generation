<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anime Prompt Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --bg-secondary: #f5f5f5;
            --bg-tertiary: #eeeeee;
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --text-muted: #999999;
            --border: #e0e0e0;
            --border-dark: #cccccc;
            --accent: #d8b4fe;
            --accent-text: #a855f7;
            --accent-secondary: #fbcfe8;
            --accent-secondary-text: #db2777;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Serif SC', 'Songti SC', serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* Main Tabs */
        .main-tabs {
            display: flex;
            overflow-x: auto;
            gap: 0;
            padding: 0;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            scrollbar-width: none;
            -ms-overflow-style: none;
            position: sticky;
            top: 0;
            z-index: 99;
        }

        .main-tabs::-webkit-scrollbar {
            display: none;
        }

        .main-tab {
            flex-shrink: 0;
            padding: 10px 16px;
            border: none;
            border-right: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.8rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .main-tab:last-child {
            border-right: none;
        }

        .main-tab.active {
            background: var(--bg);
            color: var(--accent-text);
            font-weight: 500;
            border-bottom: 2px solid var(--accent-text);
            margin-bottom: -1px;
        }

        /* Content Area */
        .content {
            padding: 0;
            max-width: 900px;
            margin: 0 auto;
        }

        .category-section {
            display: none;
        }

        .category-section.active {
            display: block;
        }

        /* Group */
        .group {
            border-bottom: 1px solid var(--border);
        }

        .group-header {
            padding: 12px 16px 8px;
            display: flex;
            align-items: baseline;
            gap: 8px;
            background: var(--bg);
        }

        .group-header h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .group-header .group-en {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .group-body {
            padding: 4px 16px 12px;
        }

        /* Tags */
        .tags-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .tag {
            padding: 4px 10px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.78rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.1s ease;
            user-select: none;
            border: none;
        }

        .tag:active {
            background: var(--bg-tertiary);
        }

        .tag.selected {
            background: var(--accent-secondary);
            color: var(--accent-secondary-text);
            font-weight: 600;
        }

        .tag .tag-en {
            font-size: 0.65rem;
            opacity: 0.6;
            margin-left: 3px;
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 300;
        }

        .tag.selected .tag-en {
            opacity: 0.7;
        }

        /* Collapsible Bottom Bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg);
            border-top: 1px solid var(--border);
            z-index: 200;
            transition: transform 0.3s ease;
        }

        .bottom-bar.collapsed {
            transform: translateY(calc(100% - 28px));
        }

        .bottom-bar-toggle {
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .bottom-bar-toggle::before {
            content: '';
            width: 36px;
            height: 3px;
            background: var(--border-dark);
            border-radius: 2px;
        }

        .bottom-bar-inner {
            max-width: 900px;
            margin: 0 auto;
            padding: 10px 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .prompt-preview {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 8px 12px;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.75rem;
            color: var(--text-secondary);
            min-height: 36px;
            max-height: 60px;
            overflow-y: auto;
            line-height: 1.5;
            word-break: break-word;
        }

        .prompt-preview:empty::before {
            content: '点击标签生成提示词...';
            color: var(--text-muted);
            font-weight: 300;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-secondary);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.8rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
        }

        .btn-primary {
            background: var(--accent-secondary);
            color: var(--accent-secondary-text);
            border-color: var(--accent-secondary);
            font-weight: 500;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(26, 26, 26, 0.9);
            color: white;
            padding: 10px 20px;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.8rem;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Selected count badge */
        .selected-count {
            position: fixed;
            top: 12px;
            right: 12px;
            background: var(--accent-secondary);
            color: var(--accent-secondary-text);
            min-width: 22px;
            height: 22px;
            padding: 0 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            z-index: 150;
            transition: all 0.2s ease;
            opacity: 0;
            transform: scale(0);
        }

        .selected-count.show {
            opacity: 1;
            transform: scale(1);
        }

        /* Desktop */
        @media (min-width: 768px) {
            .main-tab {
                padding: 12px 24px;
                font-size: 0.85rem;
            }
            .group-header {
                padding: 14px 24px 8px;
            }
            .group-body {
                padding: 4px 24px 14px;
            }
            .bottom-bar-inner {
                padding: 12px 24px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="main-tabs" id="mainTabs"></div>

    <div class="content" id="content"></div>

    <div class="selected-count" id="selectedCount">0</div>

    <div class="bottom-bar" id="bottomBar">
        <div class="bottom-bar-toggle" id="bottomBarToggle"></div>
        <div class="bottom-bar-inner">
            <div class="prompt-preview" id="promptPreview"></div>
            <div class="btn-group">
                <button class="btn" id="btnClear">清空</button>
                <button class="btn btn-primary" id="btnCopy">复制提示词</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const DATA_FILES = [
            'data/appearance.json',
            'data/clothing.json',
            'data/pose.json',
            'data/scene.json',
            'data/style.json'
        ];

        let categories = [];
        let selectedTags = new Map();
        let currentCategory = 0;
        let isBottomBarCollapsed = false;

        async function loadData() {
            const promises = DATA_FILES.map(f => fetch(f).then(r => r.json()));
            categories = await Promise.all(promises);
            renderTabs();
            renderCategory(0);
            updatePreview();
        }

        function renderTabs() {
            const container = document.getElementById('mainTabs');
            container.innerHTML = categories.map((cat, i) => `
                <button class="main-tab ${i === 0 ? 'active' : ''}" data-index="${i}">
                    ${cat.category_name}
                </button>
            `).join('');

            container.querySelectorAll('.main-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    const idx = parseInt(tab.dataset.index);
                    switchCategory(idx);
                });
            });
        }

        function switchCategory(idx) {
            currentCategory = idx;
            document.querySelectorAll('.main-tab').forEach((t, i) => {
                t.classList.toggle('active', i === idx);
            });
            renderCategory(idx);
        }

        function renderCategory(idx) {
            const cat = categories[idx];
            const container = document.getElementById('content');
            container.innerHTML = `
                <div class="category-section active">
                    ${cat.groups.map(g => renderGroup(g, cat.category)).join('')}
                </div>
            `;

            container.querySelectorAll('.tag').forEach(tag => {
                tag.addEventListener('click', () => toggleTag(tag));
            });
        }

        function renderGroup(group, category) {
            return `
                <div class="group">
                    <div class="group-header">
                        <h3>${group.group_name}</h3>
                        <span class="group-en">${group.group_name_en}</span>
                    </div>
                    <div class="group-body">
                        <div class="tags-grid">
                            ${group.tags.map(t => {
                                const key = `${category}:${t.tag}`;
                                const isSelected = selectedTags.has(key);
                                return `
                                    <span class="tag ${isSelected ? 'selected' : ''}"
                                          data-category="${category}"
                                          data-tag="${t.tag}"
                                          data-tag-en="${t.tag_en}">
                                        ${t.tag}
                                        <span class="tag-en">${t.tag_en}</span>
                                    </span>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleTag(el) {
            const category = el.dataset.category;
            const tag = el.dataset.tag;
            const tagEn = el.dataset.tagEn;
            const key = `${category}:${tag}`;

            if (selectedTags.has(key)) {
                selectedTags.delete(key);
                el.classList.remove('selected');
            } else {
                selectedTags.set(key, { tag, tagEn, category });
                el.classList.add('selected');
            }

            updatePreview();
            updateCount();
        }

        function updatePreview() {
            const preview = document.getElementById('promptPreview');
            if (selectedTags.size === 0) {
                preview.textContent = '';
                return;
            }
            const tags = Array.from(selectedTags.values());
            const prompt = tags.map(t => t.tagEn).join(', ');
            preview.textContent = prompt;
        }

        function updateCount() {
            const count = document.getElementById('selectedCount');
            count.textContent = selectedTags.size;
            count.classList.toggle('show', selectedTags.size > 0);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }

        // Bottom bar toggle
        document.getElementById('bottomBarToggle').addEventListener('click', () => {
            const bar = document.getElementById('bottomBar');
            isBottomBarCollapsed = !isBottomBarCollapsed;
            bar.classList.toggle('collapsed', isBottomBarCollapsed);
        });

        document.getElementById('btnCopy').addEventListener('click', async () => {
            if (selectedTags.size === 0) {
                showToast('请先选择标签');
                return;
            }
            const tags = Array.from(selectedTags.values());
            const prompt = tags.map(t => t.tagEn).join(', ');
            try {
                await navigator.clipboard.writeText(prompt);
                showToast('已复制到剪贴板');
            } catch {
                showToast('复制失败，请手动复制');
            }
        });

        document.getElementById('btnClear').addEventListener('click', () => {
            selectedTags.clear();
            document.querySelectorAll('.tag.selected').forEach(t => t.classList.remove('selected'));
            updatePreview();
            updateCount();
            showToast('已清空');
        });

        loadData();
    </script>
</body>
</html>
